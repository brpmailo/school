<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate Template</title>
<style>
body{font-family:Arial,sans-serif;background:#f7f7f7;padding:40px;text-align:center;}
h1{color:#004085;margin-bottom:30px;}
.templates{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;}
.template-card{background:white;border:2px solid #004085;border-radius:12px;width:250px;padding:20px;box-shadow:0 4px 10px rgba(0,0,0,0.2);transition:0.3s;}
.template-card:hover{transform:translateY(-5px);box-shadow:0 8px 20px rgba(0,0,0,0.3);}
.template-card img{width:100%;border-radius:8px;margin-bottom:15px;}
.template-card a{display:inline-block;text-decoration:none;background:#004085;color:#fff;padding:10px 20px;border-radius:6px;font-weight:bold;}
.template-card a:hover{background:#007bff;}
</style>
</head>
<body>

<h1>Choose Your Certificate Template</h1>
<div class="templates">
  <div class="template-card">
    <img src="cert.jpg" alt="Winner Certificate 1">
    <a href="win_cer.html">Design 1</a>
  </div>
  <div class="template-card">
    <img src="cr.jpg" alt="Winner Certificate 2">
    <a href="win_cer1.html">Design 2</a>
  </div>
  <div class="template-card">
    <img src="certi.jpg" alt="Winner Certificate 3">
    <a href="win_cer2.html">Design 3</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyCRZ3hgNXAkXH1hT3M7Hut6Zr5s8Kd4rZA",
    authDomain: "school-login-c007e.firebaseapp.com",
    projectId: "school-login-c007e",
    storageBucket: "school-login-c007e.firebasestorage.app",
    messagingSenderId: "464966509096",
    appId: "1:464966509096:web:3e7fdb96ddafa45cf64b1d"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Login check
onAuthStateChanged(auth,user=>{
    if(user && user.emailVerified){
        console.log("Verified user:",user.email);
    } else {
        alert("Login required!");
        window.location.href="login.html";
    }
});
</script>

</body>
</html>
