<!DOCTYPE html>
<html>
<head>
<title>Certificate</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
background:#eee;
text-align:center;
}

.cert{
position:relative;
width:90%;
max-width:1000px;
margin:auto;
}

.cert img{
width:100%;
}


.name{
position:absolute;
top:38%;
left:55%;
transform:translateX(-50%);
text-align:center;
font-size:3vw;
font-family:'Playfair Display',serif;
font-weight:600;
color:black;


text-shadow:2px 2px 4px rgba(0,0,0,0.4);
letter-spacing:2px;
}


.date{
position:absolute;
bottom:26%;
left:60%;
font-size:1.5vw;


color:#3fa9ff;
text-shadow:1px 1px 3px rgba(0,0,0,0.3);
}


.downloadbtn{
margin:20px;
padding:12px 25px;
font-size:18px;
border:none;
background:#2c7be5;
color:white;
border-radius:5px;
cursor:pointer;
}

.downloadbtn:hover{
background:#1a5fd0;
}

</style>
</head>

<body>

<button class="downloadbtn" onclick="downloadPDF()">Download Certificate</button>

<div class="cert" id="certificate">

<img src="c-e-r.png"> <!-- 🔥 YOUR JPG NAME -->

<div class="name" id="name"></div>
<div class="date" id="date"></div>

</div>

<script>


const name = localStorage.getItem("certName") || "Student Name";
document.getElementById("name").innerText = name;


const today = new Date();
const day = today.getDate();
const month = today.toLocaleString('default',{month:'long'});
const year = today.getFullYear();

document.getElementById("date").innerText =
day + " " + month + " " + year;


function downloadPDF(){

html2canvas(document.querySelector("#certificate")).then(canvas => {

const imgData = canvas.toDataURL("image/png");

const { jsPDF } = window.jspdf;
const pdf = new jsPDF('landscape');

pdf.addImage(imgData,'PNG',10,10,270,150);

pdf.save(name+"_certificate.pdf");

});

}

</script>

</body>
</html>
