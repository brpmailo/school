<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="b.png">
<title>Tuition Billing System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
font-family:Segoe UI;
margin:0;
padding:20px;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#333;
}

h1{
text-align:center;
color:white;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
background:#2c7be5;
color:white;
margin:3px;
}

.dashboard{
display:flex;
gap:15px;
margin:20px 0;
}

.card{
flex:1;
background:white;
padding:15px;
border-radius:10px;
text-align:center;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.form-box{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input,select{
padding:7px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
}

th{
background:#2c7be5;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
text-align:center;
}

.student-photo{
width:40px;
height:40px;
border-radius:50%;
object-fit:cover;
}

/* BILL */

.bill{
border:1px dashed #000;
padding:6px;
font-size:13px;
display:flex;
flex-direction:column;
justify-content:space-between;
background:white;
}

.bill-header{
display:flex;
justify-content:space-between;
font-weight:bold;
color:#0a2a66;
}

.bill-name{
text-align:center;
font-weight:bold;
font-size:16px;
}

.bill img{
width:35px;
height:35px;
border-radius:50%;
margin:auto;
}

.bill p{
margin:2px 0;
}



/* QR */

.qr{
display:flex;
justify-content:center;
margin-top:3px;
}

.qr img{
width:55px;
height:55px;
}

/* SIGNATURE */

.signature{
text-align:right;
margin-left:auto;
width:100px;
}

.signature img{
height:40px;
display:block;
margin-left:auto;
}

.signature .line{
border-top:1px solid black;
width:70px;
margin-left:auto;
}

.signature span{
font-size:10px;
}

/* PRINT */

.print-area{
display:none;
}

@media print{

@page{
size:A4;
margin:8mm;
}

body *{
visibility:hidden;
}

.print-area,
.print-area *{
visibility:visible;
}

.print-area{
position:absolute;
top:0;
left:0;
width:100%;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
gap:4mm;
}

.bill{
height:90mm;
}

}
</style>
</head>

<body>

<h1>Tuition Billing System</h1>

<div class="dashboard">
<div class="card">Total Students
<h2 id="totalStudents">0</h2></div>
<div class="card">Paid
<h2 id="paidStudents">0</h2></div>
<div class="card">Unpaid
<h2 id="unpaidStudents">0</h2></div>
<div class="card">Collection
<h2 id="totalCollection">0</h2></div>
</div>

<input type="text" id="search" placeholder="Search student..." onkeyup="searchStudent()">

<button onclick="toggleForm()">Add Student</button>
<button onclick="printAll()">Print All Bills</button>
<button onclick="exportCSV()">Export Excel</button>

<br><br>

<input type="file" id="teacherSign">
<button onclick="saveSignature()">Save Teacher Signature</button>

<input type="file" id="paymentQR">
<button onclick="saveQR()">Save Payment QR</button>

<div class="form-box" id="formBox" style="display:none">
<input id="id" placeholder="Symbol No">
<input id="name" placeholder="Name">
<input id="class" placeholder="Class">
<input id="fee" placeholder="Fee">

<select id="month">
<option>Baishakh</option>
<option>Jestha</option>
<option>Asar</option>
<option>Shrawan</option>
<option>Bhadra</option>
<option>Ashwin</option>
<option>Kartik</option>
<option>Mangsir</option>
<option>Poush</option>
<option>Magh</option>
<option>Falgun</option>
<option>Chaitra</option>
</select>

<input type="file" id="photo">
<button onclick="addStudent()">Save Student</button>
</div>

<table>
<thead>
<tr>
<th>Symbol</th>
<th>Name</th>
<th>Class</th>
<th>Month</th>
<th>Fee</th>
<th>Status</th>
<th>Photo</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="print-area" id="printArea"></div>

<script>
let students=JSON.parse(localStorage.getItem("students"))||[];
let teacherSignature=localStorage.getItem("teacherSignature");
let paymentQR=localStorage.getItem("paymentQR");

function toggleForm(){
let f=document.getElementById("formBox");
f.style.display=f.style.display=="none"?"block":"none";
}

function saveSignature(){
let file=document.getElementById("teacherSign").files[0];
let reader=new FileReader();
reader.onload=function(){
teacherSignature=reader.result;
localStorage.setItem("teacherSignature",teacherSignature);
alert("Signature Saved");
}
reader.readAsDataURL(file);
}

function saveQR(){
let file=document.getElementById("paymentQR").files[0];
let reader=new FileReader();
reader.onload=function(){
paymentQR=reader.result;
localStorage.setItem("paymentQR",paymentQR);
alert("QR Saved");
}
reader.readAsDataURL(file);
}

function addStudent(){
let id=document.getElementById("id").value;
let name=document.getElementById("name").value;
let cls=document.getElementById("class").value;
let fee=document.getElementById("fee").value;
let month=document.getElementById("month").value;
let file=document.getElementById("photo").files[0];
let reader=new FileReader();
reader.onload=function(){
students.push({id,name,class:cls,fee,month,photo:reader.result,paid:false});
save();
}
reader.readAsDataURL(file);
}

function save(){
localStorage.setItem("students",JSON.stringify(students));
display();
}

function display(){
let html="";
let paid=0;
let total=0;
students.forEach((s,i)=>{
if(s.paid){paid++; total+=Number(s.fee);}
html+=`
<tr>
<td>${s.id}</td>
<td>${s.name}</td>
<td>${s.class}</td>
<td>${s.month}</td>
<td>${s.fee}</td>
<td>${s.paid?"Paid":"Unpaid"}</td>
<td><img src="${s.photo}" class="student-photo"></td>
<td>
<button onclick="pay(${i})"><i class="fa fa-check"></i></button>
<button onclick="editMonth(${i})"><i class="fa fa-pen"></i></button>
<button onclick="printBill(${i})"><i class="fa fa-print"></i></button>
<button onclick="del(${i})"><i class="fa fa-trash"></i></button>
</td>
</tr>
`;
});
document.getElementById("table").innerHTML=html;
document.getElementById("totalStudents").innerText=students.length;
document.getElementById("paidStudents").innerText=paid;
document.getElementById("unpaidStudents").innerText=students.length-paid;
document.getElementById("totalCollection").innerText=total;
}

function pay(i){students[i].paid=true; save();}
function del(i){students.splice(i,1); save();}

function searchStudent(){
let v=document.getElementById("search").value.toLowerCase();
document.querySelectorAll("#table tr").forEach(r=>{
let name=r.children[1].innerText.toLowerCase();
r.style.display=name.includes(v)?"":"none";
});
}

function editMonth(i){
let newMonth = prompt("Enter New Month", students[i].month);
if(newMonth){students[i].month=newMonth; save();}
}

function billHTML(s){
return`
<div class="bill">
<div class="bill-header">
<span>Symbol: ${s.id}</span>
<span>Class: ${s.class}</span>
</div>
<div class="bill-name">${s.name}</div>
<img src="${s.photo}">
<p>Month : ${s.month}</p>
<p><b>Fee : Rs ${s.fee}</b></p>
<p>Status : <b>${s.paid ? "PAID" : "UNPAID"}</b></p>
<div class="qr">
${paymentQR?`<img src="${paymentQR}">`:""}
</div>
<div class="signature">
${teacherSignature?`<img src="${teacherSignature}">`:""}
<div class="line"></div>
<span>Teacher</span>
</div>
</div>
`;
}

function printBill(i){
document.getElementById("printArea").innerHTML=billHTML(students[i]);
window.print();
}

function printAll(){
let html="";
students.forEach(s=>{html+=billHTML(s);});
document.getElementById("printArea").innerHTML=html;
window.print();
}

function exportCSV(){
let csv="ID,Name,Class,Month,Fee,Status\n";
students.forEach(s=>{
csv+=`${s.id},${s.name},${s.class},${s.month},${s.fee},${s.paid?'Paid':'Unpaid'}\n`;
});
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="students.csv";
a.click();
}

display();
</script>

</body>
</html>
