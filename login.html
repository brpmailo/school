<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Login/Signup</title>
<link rel="icon" type="image/png" href="Brp Digital Institute logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    margin:0;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    background:white;
    padding:40px;
    width:380px;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    text-align:center;
}
h2{ margin-bottom:20px; color:#333; }
.input-group{ margin-bottom:15px; }
input{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:15px;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}
button:hover{ background:#5a67d8; }
#message{ margin-top:15px; font-size:14px; font-weight:bold; }
.success{ color:green; }
.error{ color:red; }
.footer{ margin-top:15px; font-size:13px; color:#777; }
.switch{ margin-top:10px; cursor:pointer; color:#667eea; text-decoration:underline;}
#resendBtn{
    margin-top:10px;
    display:none;
    padding:8px 12px;
    background:#ff9800;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}
#resendBtn:hover{ background:#e68a00;}
</style>
</head>
<body>

<div class="container">
    <h2 id="formTitle">Login</h2>

    <div class="input-group">
        <input type="email" id="email" placeholder="Enter Email">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="Enter Password">
    </div>

    <button id="actionBtn">Login</button>
    <p id="message"></p>
    <button id="resendBtn">Resend Verification Email</button>

    <p class="switch" id="switchForm">Don't have an account? Sign Up</p>
    <div class="footer">Designer: Brp Mailo</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

// Firebase Config
const firebaseConfig = {
    apiKey: "AIzaSyCRZ3hgNXAkXH1hT3M7Hut6Zr5s8Kd4rZA",
    authDomain: "school-login-c007e.firebaseapp.com",
    projectId: "school-login-c007e",
    storageBucket: "school-login-c007e.firebasestorage.app",
    messagingSenderId: "464966509096",
    appId: "1:464966509096:web:3e7fdb96ddafa45cf64b1d"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let isLogin = true;

const formTitle = document.getElementById("formTitle");
const actionBtn = document.getElementById("actionBtn");
const switchForm = document.getElementById("switchForm");
const message = document.getElementById("message");
const resendBtn = document.getElementById("resendBtn");

// Toggle Login/Signup
switchForm.addEventListener("click",()=>{
    isLogin = !isLogin;
    formTitle.innerText = isLogin ? "Login" : "Sign Up";
    actionBtn.innerText = isLogin ? "Login" : "Sign Up";
    switchForm.innerText = isLogin ? "Don't have an account? Sign Up" : "Already have an account? Login";
    message.innerText = "";
    resendBtn.style.display="none";
});

// Signup/Login Button
actionBtn.addEventListener("click",()=>{
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(email === "" || password === ""){
        message.innerText="Please fill all fields";
        message.className="error";
        return;
    }

    if(isLogin){
        // Login
        signInWithEmailAndPassword(auth,email,password)
        .then(userCredential=>{
            const user = userCredential.user;
            if(user.emailVerified){
                message.innerText="Login Successful ✅";
                message.className="success";
                setTimeout(()=>{ window.location.href="dashboard.html"; },1500);
            } else {
                message.innerText="Email not verified ❌ Check Gmail";
                message.className="error";
                resendBtn.style.display="inline-block";
                sendEmailVerification(user);
            }
        })
        .catch(error=>{
            message.innerText = error.message;
            message.className="error";
        });
    } else {
        // Signup
        createUserWithEmailAndPassword(auth,email,password)
        .then(userCredential=>{
            const user = userCredential.user;
            sendEmailVerification(user).then(()=>{
                message.innerText="Sign Up Successful ✅ Verification email sent!";
                message.className="success";
                resendBtn.style.display="inline-block";
            });
        })
        .catch(error=>{
            message.innerText = error.message;
            message.className="error";
        });
    }
});

// Resend Verification
resendBtn.addEventListener("click",()=>{
    const user = auth.currentUser;
    if(user){
        sendEmailVerification(user).then(()=>{
            alert("Verification email resent! Check Gmail / Spam folder.");
        });
    }
});
</script>

</body>
</html>
