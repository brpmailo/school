<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
overflow-x:hidden;
}


/* ================= HERO ================= */

.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
url('https://images.unsplash.com/photo-1509062522246-3755977927d7');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.hero-content{
animation:fadeIn 1.5s ease-in-out;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
letter-spacing:1px;
}

.line1{
font-size:26px;
background:linear-gradient(90deg,#ffcc00,#ff9800);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:600;
}

.line2{
font-size:24px;
color:#00e5ff;
margin-top:5px;
}

.line3{
color:#ff4081;
margin-top:10px;
font-size:18px;
}

.hero button{
margin-top:30px;
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff9800;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.hero button:hover{
background:#e68900;
transform:scale(1.05);
}



/* ================= CLASS GRID ================= */

.class-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
padding:80px 60px;
background:#f4f6fb;
}

.class-card{
height:240px;
background-size:cover;
background-position:center;
border-radius:20px;
position:relative;
cursor:pointer;
overflow:hidden;
transition:0.4s;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.class-card::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
top:0;
left:0;
}

.class-card h3{
position:absolute;
bottom:20px;
left:20px;
color:white;
z-index:2;
font-size:22px;
}

.class-card:hover{
transform:translateY(-10px) scale(1.05);
}

/* ================= NOTES SECTION ================= */

.notes-section{
display:none;
min-height:100vh;
background-size:cover;
background-position:center;
padding:80px 20px;
}

.notes-overlay{
background:rgba(0,0,0,0.75);
padding:50px;
border-radius:25px;
max-width:1000px;
margin:auto;
color:white;
backdrop-filter:blur(10px);
}

.note-card{
background:rgba(255,255,255,0.2);
padding:18px;
margin:12px 0;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

.note-card:hover{
background:rgba(255,255,255,0.35);
transform:translateX(5px);
}

.note-card a{
background:#ffeb3b;
color:black;
padding:6px 18px;
border-radius:20px;
text-decoration:none;
font-weight:bold;
}

.back-btn{
margin-bottom:25px;
background:#ff5722;
padding:8px 25px;
border:none;
border-radius:20px;
color:white;
cursor:pointer;
}

/* Animation */
@keyframes fadeIn{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

@media(max-width:768px){
.hero h1{font-size:32px;}
.class-container{padding:40px 20px;}
}

</style>
</head>
<body>

<!-- ================= HERO ================= -->

<section class="hero">
<div class="hero-content">

<h2 class="line1">Learn Today – Teach Tomorrow</h2>
<h2 class="line2">आज सिक – भोलि सिकाऊ</h2>
<p class="line3">Empowering Students Through Digital Learning</p>
<button onclick="scrollToClasses()">Explore Classes</button>
</div>
</section>



<!-- ================= CLASS GRID ================= -->

<section class="class-container" id="classContainer"></section>



<!-- ================= NOTES SECTION ================= -->

<section id="notesSection" class="notes-section">
<div class="notes-overlay">
<button class="back-btn" onclick="goBack()">⬅ Back</button>
<h2 id="classTitle"></h2>
<div id="notesContainer"></div>
</div>
</section>

/* ======================================= */

const classContainer=document.getElementById("classContainer");
const notesSection=document.getElementById("notesSection");
const notesContainer=document.getElementById("notesContainer");
const classTitle=document.getElementById("classTitle");

function loadClasses(){
classData.forEach((cls,index)=>{
const card=document.createElement("div");
card.className="class-card";
card.style.backgroundImage=`url('${cls.bg}')`;
card.innerHTML=`<h3>${cls.name}</h3>`;
card.onclick=()=>showNotes(index);
classContainer.appendChild(card);
});
}

function showNotes(index){
const selected=classData[index];
notesSection.style.display="block";
notesSection.style.backgroundImage=`url('${selected.bg}')`;
classContainer.style.display="none";
classTitle.innerText=selected.name+" Notes";

let html="";
selected.notes.forEach(note=>{
html+=`
<div class="note-card">
<span>${note.name}</span>
<a href="${note.link}" target="_blank">View</a>
</div>
`;
});

notesContainer.innerHTML=html;
window.scrollTo({top:0,behavior:"smooth"});
}

function goBack(){
notesSection.style.display="none";
classContainer.style.display="grid";
}

function scrollToClasses(){
document.querySelector(".class-container").scrollIntoView({behavior:"smooth"});
}

loadClasses();
